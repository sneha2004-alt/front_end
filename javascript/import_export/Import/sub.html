<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import & Export</title>
    <style>

        #nav > nav{
            border:2px solid red;
        }
        </style>

</head>
<body>
    <header id="nav"></header>
    <h1 id="sub"></h1>
</body>
<script type="module">
 import {subValue} from '../Export/sum.js';

 import { Navbar } from '../Export/navbar.js';

 document.addEventListener('DOMContentLoaded',()=>{
    document.querySelector('#nav').innerHTML =  Navbar();
 });

 document.querySelector('#sub').innerHTML =`sub of given value :${sumValue(100,5)}`;
</script>
</html>
