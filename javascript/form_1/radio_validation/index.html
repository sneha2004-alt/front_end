<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form
      style="
        display: inline-flex;
        justify-items: center;
        align-items: center;
        gap: 1rem;
        border: 2px solid gray;
        padding: 1rem;
      "
      name="myRadio"
      onsubmit="handleSubmit(event)"
    >
      <label for="male">male</label>
      <input id="male" type="radio" name="content" value="male" />
      <label for="female">female</label>
      <input id="female" type="radio" name="content" value="female" />
      <label for="gmail">gmail</label>
      <input id="gmail" type="radio" name="content" value="gmail" />
      <input type="submit" value="submit" />
    </form>
    <span id="output"></span>
  </body>

  <script src="./index.js"></script>
</html>
